<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Être averti·e — La Formation · Terre Mathématique</title>
<script src="colors.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ─── Page wrapper ─── */
  .waitlist-page {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px 24px;
    overflow: hidden;
  }

  /* Lueur aubergine/or en fond, cohérente avec le hero QCM */
  .waitlist-page::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 30%, rgba(var(--accent-rgb), 0.10) 0%, transparent 65%),
      radial-gradient(ellipse at 20% 80%, rgba(139, 77, 127, 0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 70%, rgba(var(--accent-rgb), 0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  .waitlist-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 580px;
    text-align: center;
  }

  /* ─── Badge ─── */
  .waitlist-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    border: 1px solid rgba(var(--accent-rgb), 0.3);
    border-radius: 100px;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(var(--accent-rgb), 0.05);
    margin-bottom: 40px;
  }
  .waitlist-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ─── Titre ─── */
  .waitlist-container h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2.4rem, 5.5vw, 3.8rem);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -0.02em;
    color: var(--heading);
    margin-bottom: 24px;
  }
  .waitlist-container h1 span {
    display: block;
    color: var(--accent);
    font-style: italic;
    font-weight: 300;
  }

  .waitlist-sub {
    font-size: clamp(1rem, 1.8vw, 1.15rem);
    color: var(--text);
    line-height: 1.7;
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto 48px;
  }

  /* ─── Formulaire ─── */
  .waitlist-form {
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: rgba(var(--heading-rgb), 0.02);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    backdrop-filter: blur(8px);
  }

  .form-field {
    display: flex;
    flex-direction: column;
    text-align: left;
    gap: 8px;
  }

  .form-field label {
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--heading-soft);
    font-weight: 500;
  }

  .form-field input {
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    padding: 16px 20px;
    background: rgba(var(--bg-rgb), 0.6);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--heading);
    transition: border-color 0.3s ease, background 0.3s ease;
  }
  .form-field input::placeholder {
    color: var(--text-muted);
  }
  .form-field input:focus {
    outline: none;
    border-color: rgba(var(--accent-rgb), 0.6);
    background: rgba(var(--bg-rgb), 0.8);
  }

  .waitlist-cta {
    margin-top: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 18px 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    color: var(--bg);
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    font-size: 1rem;
    letter-spacing: 0.03em;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .waitlist-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 40px rgba(var(--accent-rgb), 0.3);
  }
  .waitlist-cta svg {
    transition: transform 0.3s ease;
  }
  .waitlist-cta:hover svg {
    transform: translateX(4px);
  }

  .waitlist-note {
    margin-top: 20px;
    font-size: 0.82rem;
    color: var(--text-muted);
    font-style: italic;
  }

  /* ─── Back link ─── */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 40px;
    font-size: 0.88rem;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.3s ease;
  }
  .back-link:hover {
    color: var(--accent);
  }

  @media (max-width: 600px) {
    .waitlist-form { padding: 32px 22px; }
  }
</style>
</head>
<body>

<tm-header></tm-header>

<main class="waitlist-page">
  <div class="waitlist-container">

    <div class="waitlist-badge">Prochainement ... </div>

    <h1>
      Sois averti
      <span>en premier</span>
    </h1>

    <p class="waitlist-sub">
      La formation arrive bientôt. Laisse-moi ton prénom et ton email, et tu seras prévenu dès sa sortie.
    </p>

    <!--
      ⚠️  REMPLACE l'attribut action ci-dessous par l'URL de ton formulaire Systeme.io.
      Dans Systeme.io → Tunnels → ton formulaire → "Intégrer" → copie l'attribut action
      du code embed (ça ressemble à : https://systeme.io/subscription-form/XXXXXX/subscribe)
    -->
    <form class="waitlist-form"
          action="https://systeme.io/embedded/39889402/subscription"
          method="POST">

      <div class="form-field">
        <label for="first_name">Prénom</label>
        <input type="text"
               id="first_name"
               name="first_name"
               placeholder="Ton prénom"
               required>
      </div>

      <div class="form-field">
        <label for="email">Adresse email</label>
        <input type="email"
               id="email"
               name="email"
               placeholder="toi@exemple.com"
               required>
      </div>

      <div class="form-field">
        <input type="hidden"
               name="tags[]"
               value="1959600"
        >
      </div>

      <button type="submit" class="waitlist-cta">
        Me prévenir 
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>

      <p class="waitlist-note">Aucun spam. Un seul email : celui qui annonce l'ouverture.</p>
    </form>

    <a href="index.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Retour à l'accueil
    </a>

  </div>
</main>

<tm-footer></tm-footer>

<script src="components.js"></script>
<script src="cookie-consent.js"></script>
</body>
</html>
