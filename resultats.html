<script>
var QUESTIONS = [
  {
    id: "q1",
    category: "Maths \u00b7 Raisonnement",
    text: "On montre $P(0)$ et on montre que $P(n) \\Rightarrow P(2n+1)$ pour tout $n \\geq 0$. Qu\u2019a-t-on prouv\u00e9 ?",
    options: [
      { letter: "A", text: "$P(n)$ pour tout $n \\in \\mathbb{N}$" },
      { letter: "B", text: "$P(n)$ pour tout $n$ impair" },
      { letter: "C", text: "$P(2n+1) \\Rightarrow P(n)$ par descente" },
      { letter: "D", text: "Aucune des r\u00e9ponses ci-dessus" }
    ],
    correct: "D",
    explanation: "<p><strong>Ce qui est r\u00e9ellement prouv\u00e9.</strong> Partons de $P(0)$. L\u2019implication $P(n) \\Rightarrow P(2n+1)$ donne successivement $P(0) \\Rightarrow P(1) \\Rightarrow P(3) \\Rightarrow P(7) \\Rightarrow P(15) \\Rightarrow \\ldots$</p><p>On atteint exactement les entiers de la forme $u_{k+1} = 2u_k + 1$ avec $u_0 = 0$, c\u2019est-\u00e0-dire la suite $2^k - 1$ : $\\{0, 1, 3, 7, 15, 31, \\ldots\\}$.</p><p><strong>Pourquoi A est faux.</strong> On n\u2019atteint jamais $2$, ni $4$, ni aucun entier qui ne soit pas de la forme $2^k - 1$. La r\u00e9currence ne couvre qu\u2019une partie <em>exponentiellement clairsem\u00e9e</em> de $\\mathbb{N}$ (densit\u00e9 nulle).</p><p><strong>Pourquoi B est faux.</strong> On atteint bien des impairs ($1, 3, 7, 15$), mais pas tous : $5$, $9$, $11$ ne sont jamais atteints.</p><p><strong>Pourquoi C est faux.</strong> C n\u2019est pas une conclusion, c\u2019est une <em>autre</em> r\u00e8gle d\u2019inf\u00e9rence (descente infinie) qui n\u2019a aucun rapport avec ce qu\u2019on a suppos\u00e9.</p><p><strong>Le vrai enseignement.</strong> Une r\u00e9currence n\u2019est valide que si le pas permet de parcourir <em>toute</em> la cible. Ici le pas $n \\mapsto 2n+1$ saute trop loin \u2014 il faudrait $P(n) \\Rightarrow P(n+1)$ pour conclure sur $\\mathbb{N}$ entier.</p>"
  },
  {
    id: "q2",
    category: "Maths \u00b7 Raisonnement",
    text: "Sur une \u00eele, les chevaliers disent toujours la v\u00e9rit\u00e9, les brigands mentent toujours. Un habitant vous dit : \u00ab\u00a0Je suis un menteur.\u00a0\u00bb Que concluez-vous ?",
    options: [
      { letter: "A", text: "Il est brigand" },
      { letter: "B", text: "Il est chevalier" },
      { letter: "C", text: "La phrase est ind\u00e9cidable dans ce syst\u00e8me" },
      { letter: "D", text: "Il est l\u2019un ou l\u2019autre, on ne peut simplement pas savoir" }
    ],
    correct: "C",
    explanation: "<p><strong>Analyse par cas.</strong></p><p>Si l\u2019habitant est <strong>chevalier</strong>, il dit toujours vrai ; donc sa phrase \u00ab je suis un menteur \u00bb est vraie ; donc il est menteur. Contradiction.</p><p>Si l\u2019habitant est <strong>brigand</strong>, il ment toujours ; donc sa phrase est fausse ; donc il n\u2019est <em>pas</em> menteur. Contradiction.</p><p>Aucun des deux statuts n\u2019est compatible avec l\u2019\u00e9nonc\u00e9. Dans le mod\u00e8le \u00ab chevaliers / brigands \u00bb tel quel, <strong>aucun habitant ne peut prononcer cette phrase</strong>.</p><p><strong>Pourquoi D est subtil mais faux.</strong> D sugg\u00e8re qu\u2019il y a un fait cach\u00e9 (\u00ab il est l\u2019un ou l\u2019autre, on ne sait juste pas lequel \u00bb). Ce n\u2019est pas l\u2019\u00e9tat des choses : il n\u2019existe <em>aucune affectation</em> coh\u00e9rente, donc la phrase est ind\u00e9cidable par construction du syst\u00e8me.</p><p><strong>R\u00e9sonance historique.</strong> C\u2019est une version du paradoxe du menteur d\u2019\u00c9pim\u00e9nide, qui a travers\u00e9 la logique de Russell \u00e0 Tarski et jusqu\u2019au th\u00e9or\u00e8me d\u2019incompl\u00e9tude de G\u00f6del \u2014 o\u00f9 une phrase auto-r\u00e9f\u00e9rentielle analogue (\u00ab cette formule n\u2019est pas d\u00e9montrable \u00bb) devient l\u2019outil d\u00e9cisif.</p>"
  },
  {
    id: "q3",
    category: "Maths \u00b7 Raisonnement",
    text: "On d\u00e9montre qu\u2019il existe deux irrationnels $a$ et $b$ tels que $a^b$ est rationnel, en consid\u00e9rant $\\sqrt{2}^{\\sqrt{2}}$ : soit c\u2019est rationnel et c\u2019est fini, soit c\u2019est irrationnel et alors $(\\sqrt{2}^{\\sqrt{2}})^{\\sqrt{2}} = 2$. Cette preuve :",
    options: [
      { letter: "A", text: "Est parfaitement constructive car on a exhib\u00e9 $a$ et $b$" },
      { letter: "B", text: "Prouve l\u2019existence sans dire quel cas est le bon car elle utilise le tiers exclu" },
      { letter: "C", text: "Est fausse car $\\sqrt{2}^{\\sqrt{2}}$ n\u2019est pas bien d\u00e9fini" },
      { letter: "D", text: "Fonctionne par r\u00e9currence sur les puissances de $\\sqrt{2}$" }
    ],
    correct: "B",
    explanation: "<p><strong>La preuve en d\u00e9tail.</strong> Posons $\\alpha = \\sqrt{2}^{\\sqrt{2}}$. Deux cas :</p><p><strong>Cas 1</strong> : $\\alpha \\in \\mathbb{Q}$. Alors $(a, b) = (\\sqrt{2}, \\sqrt{2})$ convient.</p><p><strong>Cas 2</strong> : $\\alpha \\notin \\mathbb{Q}$. Alors prenons $(a, b) = (\\alpha, \\sqrt{2})$. On calcule $a^b = (\\sqrt{2}^{\\sqrt{2}})^{\\sqrt{2}} = \\sqrt{2}^{\\sqrt{2} \\cdot \\sqrt{2}} = \\sqrt{2}^2 = 2 \\in \\mathbb{Q}.$</p><p>Dans les deux cas, on a un couple $(a, b)$ d\u2019irrationnels avec $a^b$ rationnel.</p><p><strong>Pourquoi ce n\u2019est pas constructif.</strong> On a conclu <em>sans savoir</em> dans lequel des deux cas on se trouve. L\u2019argument repose sur le tiers exclu : \u00ab $\\alpha \\in \\mathbb{Q}$ ou $\\alpha \\notin \\mathbb{Q}$ \u00bb, sans fournir de proc\u00e9dure pour trancher. Un constructiviste (\u00e0 la Brouwer) rejetterait cette preuve.</p><p><strong>L\u2019ironie.</strong> En 1934, le th\u00e9or\u00e8me de Gelfond\u2013Schneider a tranch\u00e9 : $\\sqrt{2}^{\\sqrt{2}}$ est <em>transcendant</em>, donc irrationnel \u2014 on est dans le cas 2. Mais cette information n\u2019a \u00e9t\u00e9 connue qu\u2019apr\u00e8s la preuve, qui reste un exemple canonique de preuve non constructive.</p>"
  },
  {
    id: "q4",
    category: "Maths \u00b7 Analyse",
    text: "Une voiture roule \u00e0 $99$ km/h pendant une demi-heure, puis \u00e0 $101$ km/h pendant une demi-heure, avec changement instantan\u00e9. Que peut-on affirmer ?",
    options: [
      { letter: "A", text: "Elle a forc\u00e9ment roul\u00e9 \u00e0 $100$ km/h \u00e0 un instant" },
      { letter: "B", text: "Elle a parcouru exactement $100$ km, mais on ne peut pas garantir qu\u2019elle ait eu la vitesse $100$ km/h \u00e0 un instant" },
      { letter: "C", text: "Elle a parcouru plus de $100$ km" },
      { letter: "D", text: "Son mouvement est d\u00e9rivable sur tout l\u2019intervalle" }
    ],
    correct: "B",
    explanation: "<p><strong>La distance.</strong> Imm\u00e9diate : $99 \\times 0{,}5 + 101 \\times 0{,}5 = 49{,}5 + 50{,}5 = 100$ km. Cette partie ne d\u00e9pend que de la moyenne des vitesses.</p><p><strong>La vitesse $100$ km/h.</strong> Le th\u00e9or\u00e8me des valeurs interm\u00e9diaires exige la <em>continuit\u00e9</em>. Or ici le changement est \u00ab instantan\u00e9 \u00bb : la fonction vitesse vaut $99$ sur $[0, 0{,}5)$ puis $101$ sur $[0{,}5, 1]$. Elle ne prend <strong>jamais</strong> la valeur $100$. Le saut \u00e0 $t = 0{,}5$ enjambe cette valeur sans la traverser.</p><p><strong>Pourquoi A est le pi\u00e8ge classique.</strong> L\u2019intuition \u00ab pour passer de $99$ \u00e0 $101$, il faut bien passer par $100$ \u00bb repose sur une hypoth\u00e8se tacite de continuit\u00e9 physique. Math\u00e9matiquement, rien n\u2019oblige une fonction \u00e0 \u00eatre continue.</p><p><strong>Prolongement.</strong> Dans la r\u00e9alit\u00e9 physique, un moteur ne fait pas de saut instantan\u00e9 \u2014 l\u2019acc\u00e9l\u00e9ration est born\u00e9e, donc la vitesse est continue (m\u00eame $C^\\infty$ en pratique). Le TVI s\u2019appliquerait et la r\u00e9ponse serait A. La question teste si on distingue <em>mod\u00e8le math\u00e9matique</em> et <em>intuition physique</em>.</p>"
  },
  {
    id: "q5",
    category: "Maths \u00b7 Information",
    text: "On compare deux messages binaires de longueur $10^6$. Le message $M_1$ est obtenu \u00e0 partir de deux bits initiaux, puis par la r\u00e8gle $u_{n+2} \\equiv u_{n+1} + u_n \\pmod{2}$. Le message $M_2$ contient exactement $500\\,000$ z\u00e9ros et $500\\,000$ uns. Lequel demande, en principe, le moins d\u2019information pour \u00eatre d\u00e9crit exactement ?",
    options: [
      { letter: "A", text: "$M_1$" },
      { letter: "B", text: "$M_2$" },
      { letter: "C", text: "Les deux demandent le m\u00eame ordre de grandeur d\u2019information" },
      { letter: "D", text: "On ne peut pas conclure \u00e0 partir des seules donn\u00e9es" }
    ],
    correct: "A",
    explanation: "<p><strong>D\u00e9crire $M_1$.</strong> Il suffit de sp\u00e9cifier les deux bits initiaux $u_0, u_1$ (2 bits), la r\u00e8gle $u_{n+2} = u_{n+1} + u_n \\pmod 2$ (quelques dizaines de bits pour l\u2019encoder), et la longueur $10^6$ (environ $20$ bits). Total : de l\u2019ordre de $\\mathcal{O}(\\log n)$ bits pour d\u00e9crire un million de bits. La suite est en fait la suite de Fibonacci modulo $2$, ultra-p\u00e9riodique (p\u00e9riode 3).</p><p><strong>D\u00e9crire $M_2$.</strong> La contrainte \u00ab exactement $500\\,000$ z\u00e9ros \u00bb laisse $\\binom{10^6}{500\\,000}$ possibilit\u00e9s. Le logarithme binaire de ce coefficient binomial vaut approximativement $10^6 - \\frac{1}{2}\\log_2(\\pi \\cdot 5 \\cdot 10^5) \\approx 10^6 - 10$ bits (formule de Stirling). Il faut donc <em>presque un million de bits</em> pour identifier un message \u00e9quilibr\u00e9 g\u00e9n\u00e9rique.</p><p><strong>Conclusion.</strong> $M_1$ a une complexit\u00e9 de Kolmogorov de l\u2019ordre de $\\log(10^6) \\approx 20$, tandis que $M_2$ en a de l\u2019ordre de $10^6$. Rapport : <strong>50 000 fois</strong> moins d\u2019information pour $M_1$.</p><p><strong>Id\u00e9e fondamentale.</strong> \u00catre \u00e9quilibr\u00e9 (50/50) ne rend pas un message compressible \u2014 au contraire, l\u2019\u00e9quidistribution est la signature statistique du <em>hasard</em>. L\u2019ordre cach\u00e9 (r\u00e8gle de r\u00e9currence) est ce qui rend compressible.</p>"
  },
  {
    id: "q6",
    category: "Maths \u00b7 Mod\u00e9lisation",
    text: "On mod\u00e9lise un actif par un prix al\u00e9atoire tr\u00e8s irr\u00e9gulier. Une banque vend un produit dont le gain final d\u00e9pend de tout le trajet du prix, par exemple d\u2019une moyenne sur le mois ou du passage sous une barri\u00e8re. Un quant veut savoir si le bruit inject\u00e9 autour d\u2019un instant $t$ influence fortement le gain final. Quelle exp\u00e9rience math\u00e9matique est la seule coh\u00e9rente ?",
    options: [
      { letter: "A", text: "Mesurer la pente locale du graphe du prix au temps $t$" },
      { letter: "B", text: "Lisser artificiellement le graphe puis en calculer la d\u00e9riv\u00e9e ordinaire" },
      { letter: "C", text: "Prendre le m\u00eame sc\u00e9nario de march\u00e9, y ajouter un tout petit choc autour de $t$, puis comparer le gain final avant et apr\u00e8s" },
      { letter: "D", text: "Comparer deux journ\u00e9es historiques compl\u00e8tement diff\u00e9rentes" }
    ],
    correct: "C",
    explanation: "<p><strong>Nature du probl\u00e8me.</strong> Le payoff d\u00e9pend de la <em>trajectoire enti\u00e8re</em> $(S_t)_{t \\in [0, T]}$ \u2014 moyenne, maximum, franchissement de barri\u00e8re. Ce n\u2019est pas une fonction de $S_T$ seul.</p><p><strong>Pourquoi A \u00e9choue.</strong> La pente locale $\\partial S / \\partial t$ au temps $t$ ne dit rien sur l\u2019impact d\u2019un bruit inject\u00e9 en $t$ : pour un mouvement brownien, cette pente n\u2019existe m\u00eame pas (trajectoires nulle part d\u00e9rivables presque s\u00fbrement).</p><p><strong>Pourquoi B \u00e9choue.</strong> Lisser change l\u2019objet \u00e9tudi\u00e9. On calcule alors la sensibilit\u00e9 d\u2019un <em>autre</em> processus, pas du vrai.</p><p><strong>Pourquoi D \u00e9choue.</strong> Comparer deux sc\u00e9narios totalement distincts m\u00e9lange la sensibilit\u00e9 locale (ce qu\u2019on cherche) avec la variabilit\u00e9 globale entre sc\u00e9narios \u2014 deux effets incommensurables.</p><p><strong>La bonne id\u00e9e (C).</strong> Fixer le sc\u00e9nario $\\omega$, injecter une perturbation $\\varepsilon \\cdot \\mathbf{1}_{[t, t+dt]}$, mesurer la variation du payoff. C\u2019est exactement l\u2019esprit de la <strong>d\u00e9riv\u00e9e de Malliavin</strong> $D_t F$ : un calcul diff\u00e9rentiel sur l\u2019espace des trajectoires, o\u00f9 la \u00ab variable \u00bb est le bruit lui-m\u00eame. C\u2019est l\u2019outil standard pour les grecques path-dependent (formules de Clark\u2013Ocone, int\u00e9gration par parties stochastique).</p>"
  },
  {
    id: "q7",
    category: "Maths \u00b7 Probabilit\u00e9s",
    text: "Peut-on construire un jeu o\u00f9 chaque issue est \u00e9quiprobable et pourtant le joueur perd en esp\u00e9rance ?",
    options: [
      { letter: "A", text: "Non, \u00e9quiprobable implique jeu \u00e9quitable" },
      { letter: "B", text: "Oui, il suffit que les gains et pertes soient asym\u00e9triques" },
      { letter: "C", text: "Seulement si le nombre d\u2019issues est impair" },
      { letter: "D", text: "Oui, mais uniquement avec un nombre infini d\u2019issues" }

      { letter: "B", text: "Oui, si la r\u00e8gle de mesure dilate suffisamment les distances pr\u00e8s du bord" },
      { letter: "C", text: "Non, car le bord est toujours atteint en un nombre fini de pas" },
      { letter: "D", text: "Oui, mais seulement si le disque est non born\u00e9" }
    ],
    correct: "B",
    explanation: "<p><strong>Construction.</strong> Sur le disque unit\u00e9 $\\mathbb{D} = \\{z \\in \\mathbb{C} : |z| < 1\\}$, on pose la m\u00e9trique hyperbolique : $ds^2 = \\frac{4(dx^2 + dy^2)}{(1 - x^2 - y^2)^2}.$</p><p>Le facteur $(1 - |z|^2)^{-2}$ <strong>dilate</strong> les longueurs pr\u00e8s du bord. La distance g\u00e9od\u00e9sique d\u2019un point int\u00e9rieur $z$ au bord $|z| = 1$ est donn\u00e9e par $d_{\\text{hyp}}(0, z) = 2 \\tanh^{-1}(|z|) \\to +\\infty$ quand $|z| \\to 1$.</p><p><strong>Visuellement vs m\u00e9triquement.</strong> Un point \u00e0 distance euclidienne $10^{-6}$ du bord est \u00ab \u00e0 deux doigts \u00bb du bord sur la feuille, mais \u00e0 distance hyperbolique $\\approx 2 \\ln(2 \\cdot 10^6) \\approx 29$ dans la m\u00e9trique \u2014 et l\u2019on peut le rendre arbitrairement grand.</p><p><strong>Interpr\u00e9tation.</strong> Le disque est un mod\u00e8le du <strong>plan hyperbolique</strong> $\\mathbb{H}^2$ : courbure constante $-1$, angles conserv\u00e9s (mod\u00e8le conforme), mais distances radicalement diff\u00e9rentes. C\u2019est l\u2019espace des gravures <em>Cercle limite</em> d\u2019Escher.</p><p><strong>Le\u00e7on.</strong> La g\u00e9om\u00e9trie d\u2019un espace n\u2019est pas impos\u00e9e par l\u2019apparence visuelle : elle est un choix de m\u00e9trique. Le m\u00eame ensemble de points peut porter des g\u00e9om\u00e9tries radicalement diff\u00e9rentes (euclidienne, sph\u00e9rique, hyperbolique).</p>"
  },
  {
    id: "q18",
    category: "Maths \u00b7 Alg\u00e8bre",
    text: "On travaille avec la courbe $y^2 + y = x^3 + x + 1$ et une droite $y = ax + b$, avec $a, b \\in \\{0, 1\\}$. On suppose qu\u2019un point $P = (u, v)$ appartient \u00e0 la fois \u00e0 la courbe et \u00e0 la droite, et que les trois abscisses $u$, $u^2$, $u^4$ sont distinctes. Que peut-on conclure ?",
    options: [
      { letter: "A", text: "La droite peut couper la courbe en beaucoup plus de trois points" },
      { letter: "B", text: "Les trois points $(u, v)$, $(u^2, v^2)$, $(u^4, v^4)$ sont trois points d\u2019intersection distincts de la courbe et de la droite" },
      { letter: "C", text: "Les points $(u^2, v^2)$, $(u^4, v^4)$ ne sont pas forc\u00e9ment sur la m\u00eame droite que $(u, v)$" },
      { letter: "D", text: "On ne peut rien dire sans conna\u00eetre explicitement $u$ et $v$" }
    ],
    correct: "B",
    explanation: "<p><strong>Frobenius.</strong> Sur $\\mathbb{F}_2$, l\u2019application $\\phi : t \\mapsto t^2$ est un <strong>homomorphisme d\u2019anneaux</strong> : $\\phi(x+y) = x^2 + y^2$ (car $2xy = 0$) et $\\phi(xy) = x^2 y^2$. En particulier, $\\phi$ fixe $0$ et $1$ (seuls \u00e9l\u00e9ments de $\\mathbb{F}_2$), donc fixe toute \u00e9quation polynomiale \u00e0 coefficients dans $\\mathbb{F}_2$.</p><p><strong>Stabilit\u00e9 de la courbe.</strong> Soit $E : y^2 + y = x^3 + x + 1$. Appliquer $\\phi$ \u00e0 cette \u00e9quation : $(y^2)^2 + y^2 = (x^2)^3 + x^2 + 1,$ qui est la m\u00eame \u00e9quation \u00e9valu\u00e9e en $(x^2, y^2)$. Donc $(x, y) \\in E \\Rightarrow (x^2, y^2) \\in E$, et par it\u00e9ration $(x^{2^k}, y^{2^k}) \\in E$.</p><p><strong>Stabilit\u00e9 de la droite.</strong> La droite $y = ax + b$ avec $a, b \\in \\mathbb{F}_2$ : si $v = au + b$, alors $v^2 = a^2 u^2 + b^2 = au^2 + b$ (car $a^2 = a$, $b^2 = b$ dans $\\mathbb{F}_2$). Donc $(u^2, v^2)$ est aussi sur la droite.</p><p><strong>Conclusion.</strong> Si $(u, v)$ est intersection courbe \u2229 droite, alors $(u^2, v^2)$ et $(u^4, v^4)$ aussi. L\u2019hypoth\u00e8se d\u2019abscisses distinctes donne <strong>trois points d\u2019intersection distincts</strong>.</p><p><strong>Pourquoi A est faux et rappel fondamental.</strong> B\u00e9zout : une cubique et une droite se coupent en au plus 3 points (compt\u00e9s avec multiplicit\u00e9). Ici, on sature la borne. Loi de groupe sur courbe elliptique : $P + Q + R = 0$ pour trois points align\u00e9s, donc on a d\u00e9montr\u00e9 que $\\phi(P) + \\phi^2(P) = -P$ dans le groupe \u2014 une relation caract\u00e9ristique sur les courbes de Koblitz, exploit\u00e9es en cryptographie pour acc\u00e9l\u00e9rer la multiplication scalaire.</p>"
  },
  {
    id: "q19",
    category: "Physique \u00b7 Gravitation",
    text: "L\u2019ISS orbite \u00e0 environ $400$ km d\u2019altitude. La gravit\u00e9 y est :",
    options: [
      { letter: "A", text: "Quasi nulle, c\u2019est pour cela que les astronautes flottent" },
      { letter: "B", text: "Environ $90\\%$ de celle au sol, ils flottent car ils sont en chute libre permanente" },
      { letter: "C", text: "Exactement z\u00e9ro, ils sont \u00ab\u00a0dans l\u2019espace\u00a0\u00bb" },
      { letter: "D", text: "Variable selon la position de la Lune" }
    ],
    correct: "B",
    explanation: "<p><strong>Calcul.</strong> $g(r) = GM/r^2$. Avec $R_\\oplus \\approx 6371$ km et $h = 400$ km : $\\frac{g(R_\\oplus + h)}{g(R_\\oplus)} = \\left(\\frac{6371}{6771}\\right)^2 \\approx 0{,}885.$ La gravit\u00e9 \u00e0 l\u2019altitude de l\u2019ISS est <strong>\u2248 88,5 %</strong> de celle au sol, soit environ $8{,}7$ m/s\u00b2 contre $9{,}8$ m/s\u00b2. Tr\u00e8s loin de z\u00e9ro.</p><p><strong>Pourquoi les astronautes flottent.</strong> Ils sont en <strong>chute libre perp\u00e9tuelle</strong> autour de la Terre. L\u2019ISS et son \u00e9quipage acc\u00e9l\u00e8rent vers le centre de la Terre avec la m\u00eame acc\u00e9l\u00e9ration (principe d\u2019\u00e9quivalence de Galil\u00e9e). Dans leur r\u00e9f\u00e9rentiel, les forces de gravit\u00e9 et d\u2019inertie se compensent exactement \u2014 ils sont en <em>microgravit\u00e9 apparente</em>, pas dans un espace sans gravit\u00e9.</p><p><strong>Analogie.</strong> Un ascenseur dont les c\u00e2bles cassent : \u00e0 l\u2019int\u00e9rieur, les passagers flottent, non parce que la gravit\u00e9 a disparu, mais parce que tout le syst\u00e8me tombe ensemble. L\u2019ISS est un ascenseur en chute libre permanente, dont la vitesse horizontale (\u2248 7,7 km/s) assure qu\u2019il \u00ab rate \u00bb la Terre en tombant.</p><p><strong>Pourquoi C est profond\u00e9ment faux.</strong> \u00ab \u00catre dans l\u2019espace \u00bb ne soustrait pas \u00e0 la gravit\u00e9. La gravit\u00e9 porte \u00e0 toute distance \u2014 c\u2019est elle qui maintient la Lune, la Terre, le syst\u00e8me solaire. Confondre orbite et absence de gravit\u00e9 est l\u2019une des plus tenaces erreurs populaires.</p>"
  },
  {
    id: "q20",
    category: "Physique \u00b7 Relativit\u00e9",
    text: "Deux jumeaux : l\u2019un reste sur Terre, l\u2019autre voyage \u00e0 $99\\%$ de la vitesse de la lumi\u00e8re pendant $1$ an (mesur\u00e9 par le voyageur). Au retour :",
    options: [
      { letter: "A", text: "Ils ont le m\u00eame \u00e2ge car le temps est absolu" },
      { letter: "B", text: "Le voyageur est plus jeune que le terrien" },
      { letter: "C", text: "Le terrien est plus jeune que le voyageur" },
      { letter: "D", text: "Impossible de comparer car r\u00e9f\u00e9rentiels diff\u00e9rents" }
    ],
    correct: "B",
    explanation: "<p><strong>Dilatation temporelle.</strong> Pour un voyageur \u00e0 vitesse $v$, le facteur de Lorentz vaut $\\gamma = 1/\\sqrt{1 - v^2/c^2}$. \u00c0 $v = 0{,}99c$ : $\\gamma \\approx 7{,}09$.</p><p><strong>Comptage.</strong> Le voyageur mesure 1 an \u00e0 bord (son <em>temps propre</em>). Pour le jumeau terrien, l\u2019aller-retour dure $\\Delta t = \\gamma \\cdot 1 \\approx 7{,}09$ ans. Au retour, le terrien a vieilli de <strong>~7 ans</strong>, le voyageur de 1 an : le voyageur est <strong>plus jeune de ~6 ans</strong>.</p><p><strong>O\u00f9 est l\u2019asym\u00e9trie ?</strong> En relativit\u00e9 restreinte, toute dilatation temporelle \u00ab chacun voit l\u2019autre vieillir moins vite \u00bb serait sym\u00e9trique\u2026 <em>tant que les deux restent inertiels</em>. Mais le voyageur subit une <strong>acc\u00e9l\u00e9ration</strong> au demi-tour (ou tout au long du voyage) : son r\u00e9f\u00e9rentiel n\u2019est pas inertiel, la situation est physiquement dissym\u00e9trique. Le calcul rigoureux (invariant : $\\tau = \\int \\sqrt{1 - v^2/c^2} \\, dt$) montre que la trajectoire du voyageur dans l\u2019espace-temps est <em>plus courte</em> (temps propre moindre) que celle du terrien.</p><p><strong>Confirmation exp\u00e9rimentale.</strong> Exp\u00e9rience Hafele\u2013Keating (1971) : horloges atomiques embarqu\u00e9es en avion autour de la Terre. \u00c9cart mesur\u00e9 conforme \u00e0 la pr\u00e9diction relativiste (quelques dizaines de nanosecondes). GPS : les satellites doivent corriger leurs horloges en permanence pour les effets relativistes (restreinte et g\u00e9n\u00e9rale), sinon les positions d\u00e9rivent de ~11 km/jour.</p>"
  },
  {
    id: "q21",
    category: "Physique \u00b7 Quantique",
    text: "On admet les r\u00e8gles suivantes. Un photon peut \u00eatre pr\u00e9par\u00e9 dans une superposition de deux chemins $A$ et $B$. Si rien ne perturbe les deux chemins, ils se recombinent \u00e0 la sortie et les interf\u00e9rences font que le photon arrive toujours sur le d\u00e9tecteur OK, jamais sur le d\u00e9tecteur ALARME. On place sur le chemin $A$ une bombe ultra-sensible : si un photon la touche, elle explose ; si elle est d\u00e9fectueuse, elle laisse passer le photon sans effet. On envoie un photon dans l\u2019interf\u00e9rom\u00e8tre. R\u00e9sultat : la bombe n\u2019explose pas, mais le d\u00e9tecteur ALARME s\u2019allume. Que peut-on conclure ?",
    options: [
      { letter: "A", text: "Rien de certain : le d\u00e9tecteur ALARME peut s\u2019allumer m\u00eame sans rapport avec la bombe" },
      { letter: "B", text: "La bombe est d\u00e9fectueuse, puisque rien n\u2019a explos\u00e9" },
      { letter: "C", text: "La bombe est active avec certitude : la simple possibilit\u00e9 d\u2019une interaction sur le chemin $A$ a suffi \u00e0 d\u00e9truire l\u2019interf\u00e9rence" },
      { letter: "D", text: "On ne peut rien conclure sur une seule exp\u00e9rience" }
    ],
    correct: "C",
    explanation: "<p><strong>Situation de r\u00e9f\u00e9rence (bombe absente ou d\u00e9fectueuse).</strong> Le photon se trouve dans la superposition $(|A\\rangle + |B\\rangle)/\\sqrt{2}$. Les deux chemins se recombinent, les amplitudes interf\u00e8rent : interf\u00e9rence constructive vers OK, destructive vers ALARME. R\u00e9sultat : <strong>toujours OK</strong>.</p><p><strong>Bombe active sur le chemin $A$.</strong> La bombe est un <em>d\u00e9tecteur</em> potentiel : elle \u00ab regarde \u00bb si le photon passe en $A$.</p><p>\u2022 Si le photon passe par $A$ (probabilit\u00e9 $1/2$) : <strong>explosion</strong>.<br>\u2022 Si le photon passe par $B$ (probabilit\u00e9 $1/2$) : pas d\u2019explosion, mais la superposition est <em>d\u00e9truite</em> (la mesure a eu lieu, m\u00eame sans clic \u2014 c\u2019est le caract\u00e8re non-d\u00e9moli de la mesure quantique, ou \u00ab mesure par son absence \u00bb). Le photon se retrouve dans l\u2019\u00e9tat $|B\\rangle$ pur. \u00c0 la sortie, il choisit OK ou ALARME avec probabilit\u00e9 $1/2$ chacune.</p><p><strong>Probabilit\u00e9s conditionnelles.</strong> $\\mathbb{P}(\\text{explosion}) = 1/2$, $\\mathbb{P}(\\text{OK sans explosion}) = 1/4$, $\\mathbb{P}(\\text{ALARME sans explosion}) = 1/4$.</p><p><strong>Conclusion.</strong> Si ALARME s\u2019allume sans explosion, cela ne peut se produire qu\u2019en pr\u00e9sence d\u2019une bombe <strong>active</strong> : dans tous les autres sc\u00e9narios, ALARME est <em>impossible</em>. On a donc d\u00e9tect\u00e9 la pr\u00e9sence d\u2019une bombe fonctionnelle <strong>sans qu\u2019aucun photon ne l\u2019ait touch\u00e9e</strong>. C\u2019est une <em>mesure sans interaction</em>.</p><p><strong>Impact philosophique.</strong> L\u2019exp\u00e9rience (propos\u00e9e par Elitzur et Vaidman en 1993, r\u00e9alis\u00e9e par Kwiat et al. en 1995) met \u00e0 nu une sp\u00e9cificit\u00e9 quantique : la simple <em>possibilit\u00e9</em> d\u2019interaction modifie le comportement du syst\u00e8me. Il n\u2019y a pas d\u2019analogue classique \u2014 on \u00ab voit \u00bb un objet gr\u00e2ce aux chemins que le photon <em>n\u2019a pas pris</em>. C\u2019est l\u2019un des arguments les plus frappants contre une interpr\u00e9tation purement classique des \u00e9tats quantiques.</p>"

function generateCorrectionFromAnswers(answersMap) {
  var score = 0;
  var questions = QUESTIONS.map(function(q, i) {
    var userAnswer = answersMap[q.id] || null;
    var isCorrect = userAnswer === q.correct;
    if (isCorrect) score++;
    return {
      number: i + 1,
      category: q.category,
      text: q.text,
      options: q.options,
      correct: isCorrect,
      userAnswer: userAnswer,
      correctAnswer: q.correct,
      explanation: q.explanation
    };
  });
  return { score: score, total: QUESTIONS.length, questions: questions };
}

function displayResults(data) {
  var pct = Math.round(data.score / data.total * 100);
  document.getElementById('scoreNum').textContent = data.score;
  document.getElementById('scoreDenom').textContent = '/ ' + data.total;
  document.getElementById('scoreVerdict').textContent =
    pct >= 80 ? 'Excellent.' :
    pct >= 60 ? 'Tr\u00e8s bon r\u00e9sultat.' :
    pct >= 40 ? 'Des points \u00e0 retravailler.' : '\u00c0 revoir.';
  document.getElementById('scoreSub').textContent =
    pct >= 60
      ? 'Tu as un vrai sens du raisonnement math\u00e9matique.'
      : 'Ces questions touchent \u00e0 des id\u00e9es profondes \u2014 elles m\u00e9ritent d\u2019\u00eatre retravill\u00e9es.';
  document.getElementById('score-block').style.display = 'block';

  var list = document.getElementById('questions-list');
  data.questions.forEach(function(q, i) {
    var card = document.createElement('div');
    card.className = 'question-card ' + (q.correct ? 'correct' : 'incorrect');
    card.style.animationDelay = (i * 0.08) + 's';

    var optionsHtml = '<ul class="options-list">';
    q.options.forEach(function(opt) {
      var isCorrect = opt.letter === q.correctAnswer;
      var isWrong = opt.letter === q.userAnswer && !q.correct;
      var cls = isCorrect ? ' is-correct' : isWrong ? ' is-wrong' : '';
      var marker = isCorrect ? ' <span class="option-marker">\u2713</span>' : isWrong ? ' <span class="option-marker">\u2717</span>' : '';
      optionsHtml +=
        '<li class="option-item' + cls + '">' +
          '<span class="option-letter">' + opt.letter + ')</span>' +
          '<span>' + opt.text + '</span>' +
          marker +
        '</li>';
    });
    optionsHtml += '</ul>';

    card.innerHTML =
      '<div class="card-meta">' +
        '<span class="card-num">Q' + q.number + '</span>' +
        '<span class="card-category">' + q.category + '</span>' +
        '<span class="card-status">' + (q.correct ? '\u2705' : '\u274c') + '</span>' +
      '</div>' +
      '<div class="question-text">' + q.text + '</div>' +
      optionsHtml +
      '<div class="explanation"><div class="explanation-label">Explication</div>' + q.explanation + '</div>';

    list.appendChild(card);
  });

  if (window.MathJax && window.MathJax.typesetPromise) {
    MathJax.typesetPromise([list]).catch(function(e) { console.log(e); });
  }
}

// Priorité 1 : lien email avec ?r=DCAB... (réponses encodées, 21 lettres)
var urlParam = new URLSearchParams(window.location.search).get('r');
if (urlParam) {
  var letters = urlParam.toUpperCase().split('');
  var answersMap = {};
  QUESTIONS.forEach(function(q, i) {
    answersMap[q.id] = (letters[i] && letters[i] !== 'X') ? letters[i] : null;
  });
  displayResults(generateCorrectionFromAnswers(answersMap));
} else {
  // Priorité 2 : sessionStorage (flux direct après QCM)
  var raw = sessionStorage.getItem('qcm_resultats');
  if (!raw) {
    document.getElementById('error-block').style.display = 'block';
  } else {
    var data = JSON.parse(raw);
    sessionStorage.removeItem('qcm_resultats');
    displayResults(data);
  }
}
</script>
