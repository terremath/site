<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM Terre Mathématiques — Es-tu fait pour les maths ?</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script>
window.MathJax = {
  tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
  svg: { fontCache: 'global' },
  startup: { typeset: true }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
<style>
:root {
  --aubergine: #2D1B33;
  --aubergine-light: #4A2D54;
  --sable: #F5E6C8;
  --sable-light: #FBF3E4;
  --sable-dark: #E8D4A8;
  --gold: #C9A84C;
  --gold-light: #DFBF6E;
  --gold-dark: #A68A3C;
  --text-dark: #1A1118;
  --text-muted: #6B5A5E;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--sable);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* LANDING */
.landing {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  position: relative;
}
.landing::before {
  content: '';
  position: absolute;
  top: -20%; right: -10%;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(45,27,51,0.06) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.brand-mark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.85rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--aubergine-light);
  margin-bottom: 3rem;
  opacity: 0; animation: fadeUp 0.8s ease forwards 0.2s;
}
.landing h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.2rem, 5vw, 3.8rem);
  font-weight: 700;
  color: var(--aubergine);
  line-height: 1.15;
  margin-bottom: 1.5rem;
  opacity: 0; animation: fadeUp 0.8s ease forwards 0.4s;
}
.landing h1 em { font-style: italic; color: var(--gold-dark); }
.landing-subtitle {
  font-size: 1.05rem; color: var(--text-muted);
  max-width: 480px; line-height: 1.7;
  margin-bottom: 3rem;
  opacity: 0; animation: fadeUp 0.8s ease forwards 0.6s;
}
.landing-meta {
  display: flex; gap: 2rem; margin-bottom: 3rem;
  opacity: 0; animation: fadeUp 0.8s ease forwards 0.7s;
}
.landing-meta span {
  font-size: 0.82rem; color: var(--text-muted);
  letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 0.4rem;
}
.landing-meta span::before {
  content: ''; width: 6px; height: 6px;
  background: var(--gold); border-radius: 50%;
}
.btn-primary {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem; font-weight: 600;
  letter-spacing: 0.1em;
  padding: 1rem 3rem;
  background: var(--aubergine); color: var(--sable);
  border: none; cursor: pointer;
  transition: all 0.4s ease;
  opacity: 0; animation: fadeUp 0.8s ease forwards 0.8s;
}
.btn-primary:hover {
  background: var(--aubergine-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(45,27,51,0.2);
}

/* QUIZ */
.quiz-container {
  max-width: 720px; margin: 0 auto;
  padding: 2rem 1.5rem 4rem; min-height: 100vh;
}
.progress-bar {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 3px;
  background: var(--sable-dark); z-index: 100;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--aubergine), var(--gold));
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.quiz-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.5rem 0 2rem;
  border-bottom: 1px solid rgba(45,27,51,0.08);
  margin-bottom: 2.5rem;
}
.quiz-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.75rem; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--aubergine-light);
}
.quiz-counter {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.9rem; color: var(--text-muted);
}
.quiz-counter strong {
  color: var(--aubergine); font-size: 1.4rem; font-weight: 700;
}
.question-category {
  display: inline-block; font-size: 0.7rem;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold-dark); background: rgba(201,168,76,0.12);
  padding: 0.35rem 1rem; border-radius: 2px;
  margin-bottom: 1.5rem; font-weight: 600;
}
.question-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.3rem, 3vw, 1.6rem);
  font-weight: 600; color: var(--aubergine);
  line-height: 1.55; margin-bottom: 2.5rem;
}
.options-list {
  list-style: none; display: flex;
  flex-direction: column; gap: 0.75rem;
  margin-bottom: 2rem;
}
.option-btn {
  width: 100%; text-align: left;
  padding: 1.15rem 1.4rem;
  background: var(--sable-light);
  border: 1.5px solid rgba(45,27,51,0.08);
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem; line-height: 1.55;
  color: var(--text-dark); transition: all 0.25s ease;
  display: flex; gap: 0.8rem; align-items: flex-start;
}
.option-btn:hover:not(.selected) {
  border-color: var(--aubergine-light);
  background: white; transform: translateX(4px);
}
.option-btn.selected {
  border-color: var(--aubergine);
  background: rgba(45,27,51,0.07);
}
.option-letter {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700; font-size: 1rem;
  color: var(--aubergine-light);
  min-width: 1.4rem; flex-shrink: 0;
}
.option-btn.selected .option-letter { color: var(--aubergine); }
.option-check {
  margin-left: auto; flex-shrink: 0;
  width: 20px; height: 20px;
  border: 1.5px solid rgba(45,27,51,0.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s ease; align-self: center;
}
.option-btn.selected .option-check {
  border-color: var(--aubergine); background: var(--aubergine);
}
.option-btn.selected .option-check::after {
  content: ''; width: 6px; height: 6px;
  background: var(--sable); border-radius: 50%;
}

/* Nav */
.quiz-nav {
  display: flex; justify-content: space-between;
  align-items: center; margin-top: 1rem;
}
.btn-nav {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem; font-weight: 600;
  letter-spacing: 0.08em; padding: 0.85rem 2rem;
  border: none; cursor: pointer; transition: all 0.3s ease;
}
.btn-back {
  background: transparent; color: var(--text-muted); padding-left: 0;
}
.btn-back:hover { color: var(--aubergine); }
.btn-next {
  background: var(--aubergine); color: var(--sable); margin-left: auto;
}
.btn-next:hover { background: var(--aubergine-light); transform: translateY(-1px); }
.btn-next:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.btn-next:disabled:hover { background: var(--aubergine); transform: none; }

/* Dots */
.question-dots {
  display: flex; justify-content: center;
  gap: 6px; margin-top: 2rem; flex-wrap: wrap;
}
.q-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--sable-dark); transition: all 0.3s ease;
}
.q-dot.answered { background: var(--gold); }
.q-dot.current { background: var(--aubergine); transform: scale(1.3); }

/* EMAIL SCREEN */
.email-screen {
  min-height: 100vh; display: flex;
  flex-direction: column; align-items: center;
  justify-content: center; text-align: center;
  padding: 2rem;
}
.completion-icon {
  font-size: 3rem; margin-bottom: 1.5rem;
  color: var(--gold);
  opacity: 0; animation: fadeUp 0.6s ease forwards 0.1s;
}
.completion-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.8rem, 4vw, 2.5rem);
  font-weight: 700; color: var(--aubergine);
  margin-bottom: 0.8rem;
  opacity: 0; animation: fadeUp 0.6s ease forwards 0.2s;
}
.summary-bar {
  display: flex; justify-content: center;
  gap: 4px; margin-bottom: 2rem;
  opacity: 0; animation: fadeUp 0.6s ease forwards 0.3s;
}
.summary-dot {
  width: 10px; height: 10px; border-radius: 2px; background: var(--gold);
}
.summary-dot.unanswered { background: var(--sable-dark); }
.completion-sub {
  font-size: 0.95rem; color: var(--text-muted);
  max-width: 460px; line-height: 1.7;
  margin-bottom: 2.5rem;
  opacity: 0; animation: fadeUp 0.6s ease forwards 0.4s;
}
.email-box {
  background: white; padding: 2.5rem;
  max-width: 480px; width: 100%;
  border: 1px solid rgba(45,27,51,0.08);
  opacity: 0; animation: fadeUp 0.6s ease forwards 0.5s;
}
.email-box h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem; font-weight: 700;
  color: var(--aubergine); margin-bottom: 1rem;
}
.email-perks { text-align: left; margin-bottom: 1.5rem; }
.email-perk {
  display: flex; align-items: flex-start;
  gap: 0.6rem; font-size: 0.85rem;
  color: var(--text-dark); margin-bottom: 0.7rem; line-height: 1.4;
}
.email-perk::before {
  content: '\2192'; color: var(--gold-dark);
  font-weight: 700; flex-shrink: 0; margin-top: 0.05rem;
}
.email-field { display: flex; flex-direction: column; gap: 0.75rem; }
.email-input {
  width: 100%; padding: 0.95rem 1rem;
  border: 1.5px solid var(--sable-dark);
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  background: var(--sable-light); color: var(--text-dark);
  outline: none; transition: border-color 0.3s;
}
.email-input:focus { border-color: var(--aubergine-light); }
.email-input::placeholder { color: var(--text-muted); opacity: 0.5; }
.btn-submit-email {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem; font-weight: 600;
  letter-spacing: 0.08em; padding: 0.95rem 2rem;
  background: var(--gold); color: var(--aubergine);
  border: none; cursor: pointer;
  transition: all 0.3s ease; width: 100%;
}
.btn-submit-email:hover { background: var(--gold-light); transform: translateY(-1px); }
.email-success-msg {
  display: none;
  background: rgba(74,124,89,0.08);
  border: 1px solid rgba(74,124,89,0.2);
  padding: 1rem; margin-top: 1rem;
  font-size: 0.88rem; color: #3d6b4a; line-height: 1.5;
}
.email-privacy {
  font-size: 0.72rem; color: var(--text-muted);
  opacity: 0.5; margin-top: 0.8rem;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .quiz-container { padding: 1.5rem 1rem 3rem; }
  .landing-meta { flex-direction: column; gap: 0.8rem; }
  .option-btn { padding: 1rem 1.1rem; font-size: 0.88rem; }
  .email-box { padding: 1.8rem; }
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div id="quiz" class="quiz-container">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="quiz-header">
    <div class="quiz-brand">Terre Math&eacute;matiques</div>
    <div class="quiz-counter"><strong id="qNum">1</strong><span> / 21</span></div>
  </div>
  <div id="questionArea"></div>
  <div class="quiz-nav">
    <button type="button" class="btn-nav btn-back" id="btnBack" onclick="prevQuestion()">&larr; Pr&eacute;c&eacute;dent</button>
    <button type="button" class="btn-nav btn-next" id="btnNext" onclick="nextQuestion()" disabled>Suivant &rarr;</button>
  </div>
  <div class="question-dots" id="questionDots"></div>
</div>

<div id="emailScreen" class="email-screen hidden"></div>

<script>
var questions = [
  {
    category: "Maths \u00b7 Raisonnement",
    text: "On montre $P(0)$ et on montre que $P(n) \\Rightarrow P(2n+1)$ pour tout $n \\geq 0$. Qu\u2019a-t-on prouv\u00e9 ?",
    options: [
      "$P(n)$ pour tout $n \\in \\mathbb{N}$",
      "$P(n)$ pour tout $n$ impair",
      "$P(n)$ pour tout $n \\geq 0$ par r\u00e9currence classique",
      "Aucune des r\u00e9ponses ci-dessus"
    ],
    correct: 3
  },
  {
    category: "Maths \u00b7 Raisonnement",
    text: "Sur une \u00eele, les chevaliers disent toujours la v\u00e9rit\u00e9, les menteurs mentent toujours. Un habitant vous dit : \u00ab\u00a0Je suis un menteur.\u00a0\u00bb Que concluez-vous ?",
    options: [
      "Il est menteur",
      "Il est chevalier",
      "Cette situation est impossible \u2014 la phrase est ind\u00e9cidable dans ce syst\u00e8me",
      "Il est l\u2019un ou l\u2019autre, on ne peut simplement pas savoir"
    ],
    correct: 2
    }
];
var currentQ = 0;
var answers = new Array(questions.length).fill(null);

function startQuiz() {
  renderDots();
  showQuestion();
}

document.addEventListener('DOMContentLoaded', startQuiz);

function renderDots() {
  var dots = document.getElementById('questionDots');
  var html = '';
  for (var i = 0; i < questions.length; i++) {
    var cls = 'q-dot';
    if (i === currentQ) cls += ' current';
    else if (answers[i] !== null) cls += ' answered';
    html += '<div class="' + cls + '"></div>';
  }
  dots.innerHTML = html;
}

function showQuestion() {
  var q = questions[currentQ];
  document.getElementById('qNum').textContent = currentQ + 1;
  document.getElementById('progressFill').style.width = ((currentQ) / questions.length * 100) + '%';
  document.getElementById('btnBack').style.visibility = currentQ === 0 ? 'hidden' : 'visible';

  var btnNext = document.getElementById('btnNext');
  btnNext.disabled = answers[currentQ] === null;
  btnNext.innerHTML = currentQ === questions.length - 1 ? 'Terminer &rarr;' : 'Suivant &rarr;';

  var letters = ['A', 'B', 'C', 'D'];
  var html = '<div class="question-category">' + q.category + '</div>';
  html += '<div class="question-text">' + q.text + '</div>';
  html += '<ul class="options-list">';
  for (var i = 0; i < q.options.length; i++) {
    var sel = answers[currentQ] === i ? ' selected' : '';
    html += '<li><button type="button" class="option-btn' + sel + '" onclick="selectAnswer(' + i + ')">';
    html += '<span class="option-letter">' + letters[i] + ')</span>';
    html += '<span class="option-text">' + q.options[i] + '</span>';
    html += '<span class="option-check"></span>';
    html += '</button></li>';
  }
  html += '</ul>';

  var area = document.getElementById('questionArea');
  area.innerHTML = html;

  if (window.MathJax && window.MathJax.typesetPromise) {
    MathJax.typesetPromise([area]).catch(function(err) { console.log('MathJax:', err); });
  }
  renderDots();
}

function selectAnswer(idx) {
  answers[currentQ] = idx;
  var btns = document.querySelectorAll('.option-btn');
  for (var i = 0; i < btns.length; i++) {
    if (i === idx) btns[i].classList.add('selected');
    else btns[i].classList.remove('selected');
  }
  document.getElementById('btnNext').disabled = false;
}

function nextQuestion() {
  if (answers[currentQ] === null) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    showQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showEmailScreen();
  }
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    showQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function showEmailScreen() {
  document.getElementById('quiz').classList.add('hidden');
  var screen = document.getElementById('emailScreen');
  screen.classList.remove('hidden');

  var dotsHtml = '';
  for (var i = 0; i < answers.length; i++) {
    dotsHtml += '<div class="summary-dot' + (answers[i] === null ? ' unanswered' : '') + '"></div>';
  }

  var answeredCount = answers.filter(function(a) { return a !== null; }).length;

  screen.innerHTML = '<div class="completion-icon">\u2726</div>' +
    '<div class="completion-title">Test termin\u00e9.</div>' +
    '<div class="summary-bar">' + dotsHtml + '</div>' +
    '<p class="completion-sub">Tes r\u00e9ponses sont enregistr\u00e9es. Pour d\u00e9couvrir ton score, recevoir la correction d\u00e9taill\u00e9e de chaque question et des ouvertures vers les th\u00e9or\u00e8mes sous-jacents \u2014 entre ton adresse mail ci-dessous.</p>' +
    '<div class="email-box">' +
      '<h3>Recevoir ma correction</h3>' +
      '<div class="email-perks">' +
        '<div class="email-perk">Ton score et le corrig\u00e9 complet des 21 questions</div>' +
        '<div class="email-perk">L\u2019explication du raisonnement derri\u00e8re chaque r\u00e9ponse</div>' +
        '<div class="email-perk">Des ouvertures : G\u00f6del, Banach-Tarski, Von Neumann, principe holographique\u2026</div>' +
        '<div class="email-perk">Un aper\u00e7u de la m\u00e9thode TerreMath\u00e9matique</div>' +
      '</div>' +
      '<div class="email-field">' +
        '<input type="text" class="email-input" id="prenomInput" placeholder="Ton pr\u00e9nom" onkeydown="if(event.key===\'Enter\')submitEmail()">' +
        '<input type="email" class="email-input" id="emailInput" placeholder="ton@email.com" onkeydown="if(event.key===\'Enter\')submitEmail()">' +
        '<button class="btn-submit-email" onclick="submitEmail()">Recevoir ma correction \u2192</button>' +
      '</div>' +
      '<div class="email-success-msg" id="emailSuccess">' +
        '<strong>C\u2019est parti !</strong> V\u00e9rifie ta bo\u00eete mail \u2014 tu recevras ton analyse d\u00e9taill\u00e9e dans quelques minutes.' +
      '</div>' +
      '<div class="email-privacy">Pas de spam. Jamais. D\u00e9sabonnement en un clic.</div>' +
    '</div>';
}

async function submitEmail() {
  var prenomInput = document.getElementById('prenomInput');
  var emailInput = document.getElementById('emailInput');
  var prenom = prenomInput.value.trim();
  var email = emailInput.value.trim();

  var hasError = false;
  if (!prenom) { prenomInput.style.borderColor = '#8B3A3A'; hasError = true; } else { prenomInput.style.borderColor = ''; }
  if (!email || email.indexOf('@') === -1 || email.indexOf('.') === -1) { emailInput.style.borderColor = '#8B3A3A'; hasError = true; } else { emailInput.style.borderColor = ''; }
  if (hasError) return;

  // Soumission vers systeme.io — formulaire natif (avec tag)
  var sioForm = document.getElementById('systemeio-form');
  sioForm.querySelector('[name=first_name]').value = prenom;
  sioForm.querySelector('[name=email]').value = email;
  sioForm.querySelector('[name=redirect_url]').value = 'https://app.terremathematiques.com/merci-news';
  sioForm.querySelector('[name=answers]').value = JSON.stringify(answers);
  sioForm.submit();

  // Envoi au backend
  var data = { prenom: prenom, email: email, answers: answers };
  await fetch("https://qcm-backend-mmkd.onrender.com/qcm", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  document.getElementById('emailSuccess').style.display = 'block';
  var btn = document.querySelector('.btn-submit-email');
  btn.textContent = 'Envoy\u00e9 \u2713';
  btn.style.background = '#4A7C59';
  btn.style.color = 'white';
  btn.disabled = true;
  emailInput.disabled = true;
  prenomInput.disabled = true;
}
</script>

<!-- Formulaire systeme.io natif caché — nécessaire pour que le tag soit appliqué -->
<form id="systemeio-form" method="post" action="https://systeme.io/embedded/39815731/subscription" style="position:absolute;left:-9999px;opacity:0;pointer-events:none">
  <input type="hidden" name="first_name" value="" />
  <input type="hidden" name="email" value="" />
  <input type="hidden" name="redirect_url" value="" />
  <input type="hidden" name="answers" value="" />
</form>
<script id="form-script-tag-23548537" src="https://app.terremathematiques.com/public/remote/page/398157315591be9af8f349908517440c3b49c1fd.js"></script>
</body>
</html>
